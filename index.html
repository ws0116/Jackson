<style>
/* ── 游戏卡片网格 (大照片版) ── */
.game-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  padding: 16px 20px;
}

.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: all 0.25s;
  overflow: hidden;
  position: relative;
}

.game-card:hover {
  border-color: var(--pink);
  transform: translateY(-3px);
  box-shadow: 0 6px 24px var(--pink-glow);
}

.game-card-img {
  width: 100%;
  height: 140px; /* 大照片的高度 */
  background: var(--bg3);
  position: relative;
}

.game-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.game-card-info {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.game-card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.game-card-sub {
  font-size: 12px;
  color: var(--text-dim);
}

.game-card-btn {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--pink), var(--accent2));
  color: #fff;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.game-card-btn:hover { opacity: 0.9; }

/* ── 其他服务网格 (小图标版) ── */
.service-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 0 20px 16px;
}

.service-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
  text-decoration: none;
  color: var(--text);
  display: block;
  transition: all 0.2s;
}

.service-card:hover {
  border-color: var(--pink);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px var(--pink-glow);
}

.service-icon {
  width: 54px; height: 54px;
  border-radius: 12px;
  background: var(--bg3);
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
}

.service-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.service-card p  { font-size: 11px; color: var(--text-dim); }

/* ── 特性介绍 ── */
.features {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 20px 20px 16px;
  text-align: center;
}

.feature .f-icon { font-size: 22px; margin-bottom: 6px; }
.feature .f-label { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

.section-label {
  padding: 16px 20px 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}
</style>
